name: Discussion Health Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  discussions: write
  contents: read
  packages: read

env:
  CLIO_MODEL: gpt-5-mini
  REGISTRY: ghcr.io

jobs:
  health-check:
    name: Review Discussion Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CLIO container
        run: docker pull ghcr.io/syntheticautonomicmind/clio:latest

      - name: Prepare workspace
        run: |
          mkdir -p /tmp/clio-workspace
          cp -r ./* /tmp/clio-workspace/ 2>/dev/null || true
          cp -r ./.clio /tmp/clio-workspace/ 2>/dev/null || true
          cp -r ./.github /tmp/clio-workspace/ 2>/dev/null || true
          mkdir -p /tmp/clio-workspace/.clio/sessions
          mkdir -p /tmp/clio-config

      - name: Configure CLIO authentication
        env:
          CLIO_ACCESS: ${{ secrets.CLIO_ACCESS }}
        run: |
          set +x
          printf '{"github_token": "%s", "saved_at": %d}' "$CLIO_ACCESS" "$(date +%s)" > /tmp/clio-config/github_tokens.json
          chmod 600 /tmp/clio-config/github_tokens.json
          echo '{"provider": "github_copilot"}' > /tmp/clio-config/config.json

      - name: Gather discussion metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Organization discussions are stored in the source repository (.github)
          gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                discussions(first: 50, orderBy: {field: CREATED_AT, direction: DESC}) {
                  totalCount
                  nodes {
                    number
                    title
                    createdAt
                    updatedAt
                    author { login }
                    category { name }
                    comments { totalCount }
                    isAnswered
                    url
                  }
                }
              }
            }
          ' -f owner="${{ github.repository_owner }}" -f repo=".github" > /tmp/clio-workspace/DISCUSSIONS_DATA.json 2>/dev/null || echo '{"data":{"repository":{"discussions":{"totalCount":0,"nodes":[]}}}}' > /tmp/clio-workspace/DISCUSSIONS_DATA.json

          jq -r '
            .data.repository.discussions as $d |
            "# Discussion Health Report\n\n" +
            "**Total Open Discussions:** \($d.totalCount)\n\n" +
            "## Recent Discussions\n\n" +
            ($d.nodes | map(
              "### #\(.number): \(.title)\n" +
              "- **Author:** \(.author.login)\n" +
              "- **Category:** \(.category.name)\n" +
              "- **Created:** \(.createdAt)\n" +
              "- **Last Updated:** \(.updatedAt)\n" +
              "- **Comments:** \(.comments.totalCount)\n" +
              "- **Answered:** \(.isAnswered)\n" +
              "- **URL:** \(.url)\n"
            ) | join("\n"))
          ' /tmp/clio-workspace/DISCUSSIONS_DATA.json > /tmp/clio-workspace/DISCUSSIONS_REPORT.md

          jq -r '
            .data.repository.discussions.nodes |
            map(select(.isAnswered == false and .category.name == "Q&A")) |
            if length > 0 then
              "## Unanswered Q&A Discussions\n\n" +
              (map("- #\(.number): \(.title) by @\(.author.login) (\(.comments.totalCount) comments)") | join("\n"))
            else
              "## All Q&A discussions are answered or recent"
            end
          ' /tmp/clio-workspace/DISCUSSIONS_DATA.json > /tmp/clio-workspace/NEEDS_ATTENTION.md

          jq -r '
            .data.repository.discussions.nodes |
            map(select(.comments.totalCount == 0)) |
            if length > 0 then
              "## Discussions with No Responses\n\n" +
              (map("- #\(.number): \(.title) by @\(.author.login)") | join("\n"))
            else
              "## All discussions have at least one response"
            end
          ' /tmp/clio-workspace/DISCUSSIONS_DATA.json > /tmp/clio-workspace/NO_RESPONSES.md

          echo "Discussion data gathered"

      - name: Run CLIO Health Analysis
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TASK="You are in HEADLESS CI/CD MODE. No human is present.

          TASK: Analyze Discussion Health

          STEPS:
          1. Read .github/clio-prompts/discussion-health.md for instructions
          2. Read DISCUSSIONS_REPORT.md for all discussions
          3. Read NEEDS_ATTENTION.md for unanswered Q&A
          4. Read NO_RESPONSES.md for discussions needing responses
          5. WRITE your analysis to /workspace/health-report.json using file_operations

          CRITICAL:
          - DO NOT use user_collaboration (it will hang forever)
          - Write JSON to /workspace/health-report.json using file_operations create_file"

          echo "=== Starting CLIO Health Analysis ==="

          docker run -i --rm \
            -v "/tmp/clio-workspace":/workspace:rw \
            -v "/tmp/clio-config":/root/.clio:rw \
            -w /workspace \
            -e CLIO_LOG_LEVEL=WARNING \
            -e GH_TOKEN="${GH_TOKEN}" \
            ghcr.io/syntheticautonomicmind/clio:latest \
            --new \
            --model "$CLIO_MODEL" \
            --input "$TASK" \
            --exit 2>&1 | tee /tmp/clio-workspace/full_response.txt || true

          echo ""
          echo "=== CLIO Analysis Complete ==="

      - name: Get health report JSON
        id: extract
        run: |
          if [ -f /tmp/clio-workspace/health-report.json ] && jq . /tmp/clio-workspace/health-report.json > /dev/null 2>&1; then
            echo "Using health-report.json written by CLIO"
            cp /tmp/clio-workspace/health-report.json /tmp/clio-workspace/analysis.json
            echo "json_valid=true" >> $GITHUB_OUTPUT
          else
            echo "json_valid=false" >> $GITHUB_OUTPUT
            TOTAL=$(jq -r '.data.repository.discussions.totalCount // 0' /tmp/clio-workspace/DISCUSSIONS_DATA.json)
            UNANSWERED=$(jq -r '[.data.repository.discussions.nodes[] | select(.isAnswered == false and .category.name == "Q&A")] | length' /tmp/clio-workspace/DISCUSSIONS_DATA.json)
            NO_RESPONSE=$(jq -r '[.data.repository.discussions.nodes[] | select(.comments.totalCount == 0)] | length' /tmp/clio-workspace/DISCUSSIONS_DATA.json)

            echo "{\"total_open\":$TOTAL,\"unanswered_qa\":$UNANSWERED,\"no_responses\":$NO_RESPONSE,\"health_score\":\"unknown\",\"needs_attention\":$((UNANSWERED + NO_RESPONSE)),\"summary\":\"Automated analysis complete. Manual review recommended.\"}" > /tmp/clio-workspace/analysis.json
            echo "Using fallback JSON"
          fi

          echo "=== Health Report JSON ==="
          cat /tmp/clio-workspace/analysis.json

      - name: Parse results
        id: parse
        run: |
          ANALYSIS=$(cat /tmp/clio-workspace/analysis.json)

          NEEDS_ATTENTION=$(echo "$ANALYSIS" | jq -r '.needs_attention // 0')
          HEALTH_SCORE=$(echo "$ANALYSIS" | jq -r '.health_score // "unknown"')
          SUMMARY=$(echo "$ANALYSIS" | jq -r '.summary // "Health check complete."')

          echo "needs_attention=$NEEDS_ATTENTION" >> $GITHUB_OUTPUT
          echo "health_score=$HEALTH_SCORE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      - name: Create summary report
        if: always()
        run: |
          ANALYSIS=$(cat /tmp/clio-workspace/analysis.json)
          HEALTH_SCORE=$(echo "$ANALYSIS" | jq -r '.health_score // "unknown"')
          NEEDS_ATTENTION=$(echo "$ANALYSIS" | jq -r '.needs_attention // 0')
          TOTAL=$(echo "$ANALYSIS" | jq -r '.total_open // 0')
          SUMMARY=$(echo "$ANALYSIS" | jq -r '.summary // "Health check complete."')

          echo "## Discussion Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Open Discussions | ${TOTAL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Needs Attention | ${NEEDS_ATTENTION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Score | ${HEALTH_SCORE} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Summary:** ${SUMMARY}" >> $GITHUB_STEP_SUMMARY

      - name: Alert on urgent items
        if: steps.parse.outputs.needs_attention > 5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEEDS_ATTENTION="${{ steps.parse.outputs.needs_attention }}"
          echo "Found $NEEDS_ATTENTION items needing attention"
          echo "Consider reviewing unanswered Q&A discussions and responding to discussions with no comments."
